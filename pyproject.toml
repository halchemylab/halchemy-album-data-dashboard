[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"app.py" = ["E402"]

[tool.mypy]
python_version = "3.13"
files = [
    "agent",
    "album_agent.py",
    "album_data.py",
    "album_memory.py",
    "album_missions.py",
]
check_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
